name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          go build -ldflags="-s -w -X github.com/eugene-lai/ai-kernel/cmd.version=${VERSION#v}" \
            -o "bin/ai-kernel-${GOOS}-${GOARCH}" .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bin/ai-kernel-${{ matrix.goos }}-${{ matrix.goarch }}
